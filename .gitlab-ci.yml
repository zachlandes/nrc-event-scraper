stages:
  - scrape

daily-scrape:
  stage: scrape
  image: python:3.12-slim
  # Run daily at 6:00 AM UTC — configure under CI/CD > Schedules in GitLab UI
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"  # allow manual trigger from UI
  before_script:
    - pip install uv
    - uv sync --all-extras
  script:
    - uv run nrc-scraper incremental
    - uv run nrc-scraper stats
  after_script:
    - git config user.name "GitLab CI"
    - git config user.email "ci@gitlab.com"
    - git remote set-url origin "https://gitlab-ci-token:${GITLAB_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git add data/events/ data/scraper.db
    - |
      if git diff --cached --quiet; then
        echo "No new events to commit"
      else
        git commit -m "data: daily scrape $(date -u +%Y-%m-%d)"
        git push origin HEAD:${CI_COMMIT_BRANCH}
      fi
