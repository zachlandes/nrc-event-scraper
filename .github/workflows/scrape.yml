name: NRC Event Scraper

# Only allow one scraping workflow to run at a time
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    # Run daily at 6:00 AM UTC (1:00 AM ET, after NRC publishes)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - backfill
          - reparse
      years:
        description: "Years to backfill/reparse (e.g. '2020-2026' or '2015'). Used in backfill and reparse modes."
        required: false
        type: string

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # just under 6hr GitHub limit
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run scraper
        run: |
          MODE="${{ inputs.mode || 'incremental' }}"
          if [ "$MODE" = "backfill" ]; then
            YEARS="${{ inputs.years }}"
            if [ -n "$YEARS" ]; then
              # Support range (2020-2026) or single year (2020)
              if echo "$YEARS" | grep -q '-'; then
                START=$(echo "$YEARS" | cut -d'-' -f1)
                END=$(echo "$YEARS" | cut -d'-' -f2)
                # Build comma-separated list: 2020,2021,2022,...
                CSV=$(seq "$START" "$END" | paste -sd, -)
                echo "Backfilling years $START–$END"
                uv run nrc-scraper backfill --years "$CSV"
              else
                echo "Backfilling year $YEARS"
                uv run nrc-scraper backfill --years "$YEARS"
              fi
            else
              echo "Backfilling all years (this will take several hours)"
              uv run nrc-scraper backfill
            fi
          elif [ "$MODE" = "reparse" ]; then
            YEARS="${{ inputs.years }}"
            if [ -n "$YEARS" ]; then
              if echo "$YEARS" | grep -q '-'; then
                START=$(echo "$YEARS" | cut -d'-' -f1)
                END=$(echo "$YEARS" | cut -d'-' -f2)
                CSV=$(seq "$START" "$END" | paste -sd, -)
                echo "Reparsing years $START-$END"
                uv run nrc-scraper reparse --years "$CSV"
              else
                echo "Reparsing year $YEARS"
                uv run nrc-scraper reparse --years "$YEARS"
              fi
            else
              echo "Reparsing all archived years"
              uv run nrc-scraper reparse
            fi
          else
            echo "Running incremental scrape"
            uv run nrc-scraper incremental
          fi

      - name: Show stats
        run: uv run nrc-scraper stats

      - name: Update Excel dataset
        run: uv run python scripts/jsonl_to_xlsx.py

      - name: Commit new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events/ data/scraper.db data/html/ data/nrc_events_all.xlsx
          if git diff --cached --quiet; then
            echo "No new events to commit"
          else
            EVENT_COUNT=$(uv run nrc-scraper stats 2>/dev/null | grep "Total unique" | grep -o '[0-9]*' || echo "?")
            git commit -m "data: scrape $(date -u +%Y-%m-%d) ($EVENT_COUNT events)"
            git push
          fi
